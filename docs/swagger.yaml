basePath: /
definitions:
  handler.AddDiskRequest:
    properties:
      direct:
        type: boolean
      path:
        type: string
      readonly:
        type: boolean
    type: object
  handler.AddInterfaceRequest:
    properties:
      ip:
        type: string
      mac:
        type: string
      mask:
        type: string
      tap:
        type: string
    type: object
  handler.CPURequest:
    properties:
      boot_vcpus:
        type: integer
      max_vcpus:
        type: integer
    type: object
  handler.CPUResponse:
    properties:
      effective:
        type: integer
      requested:
        type: integer
    type: object
  handler.ConsoleRequest:
    properties:
      mode:
        type: string
      path:
        type: string
    type: object
  handler.CreateVMRequest:
    properties:
      console:
        $ref: '#/definitions/handler.ConsoleRequest'
      cpus:
        $ref: '#/definitions/handler.CPURequest'
      disks:
        items:
          $ref: '#/definitions/handler.DiskRequest'
        type: array
      kernel:
        $ref: '#/definitions/handler.KernelRequest'
      memory:
        $ref: '#/definitions/handler.MemoryRequest'
      name:
        type: string
      net:
        items:
          $ref: '#/definitions/handler.NetRequest'
        type: array
      serial:
        $ref: '#/definitions/handler.ConsoleRequest'
    type: object
  handler.DiskRequest:
    properties:
      direct:
        type: boolean
      path:
        type: string
      readonly:
        type: boolean
    type: object
  handler.DiskResponse:
    properties:
      direct:
        type: boolean
      format:
        type: string
      id:
        type: string
      path:
        type: string
      readonly:
        type: boolean
    type: object
  handler.InterfaceResponse:
    properties:
      id:
        type: string
      ip:
        type: string
      mac:
        type: string
      mask:
        type: string
      tap:
        type: string
    type: object
  handler.KernelRequest:
    properties:
      path:
        type: string
    type: object
  handler.MemoryRequest:
    properties:
      size:
        type: integer
    type: object
  handler.MemoryResponse:
    properties:
      effective_mb:
        type: integer
      requested_mb:
        type: integer
    type: object
  handler.NetRequest:
    properties:
      ip:
        type: string
      mac:
        type: string
      tap:
        type: string
    type: object
  handler.PatchCPURequest:
    properties:
      count:
        type: integer
    type: object
  handler.PatchInterfaceRequest:
    properties:
      ip:
        type: string
      mac:
        type: string
      mask:
        type: string
      tap:
        type: string
    type: object
  handler.PatchMemoryRequest:
    properties:
      size_mb:
        type: integer
    type: object
  handler.VMResponse:
    properties:
      config:
        $ref: '#/definitions/vmm.VmConfig'
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
  problem.Detail:
    properties:
      detail:
        description: Detail is a human-readable explanation specific to this occurrence.
        type: string
      errors:
        description: Errors holds machine-readable validation errors.
        items:
          $ref: '#/definitions/problem.FieldError'
        type: array
      instance:
        description: Instance is a URI reference that identifies the specific occurrence.
        type: string
      status:
        description: Status is the HTTP status code generated by the origin server.
        type: integer
      title:
        description: Title is a short, human-readable summary of the problem type.
        type: string
      type:
        description: Type is a URI reference that identifies the problem type.
        type: string
    type: object
  problem.FieldError:
    properties:
      field:
        type: string
      message:
        type: string
    type: object
  vmm.BalloonConfig:
    properties:
      deflate_on_oom:
        type: boolean
      free_page_reporting:
        type: boolean
      size:
        type: integer
    type: object
  vmm.CPUConfig:
    properties:
      boot_vcpus:
        type: integer
      kvm_hyperv:
        type: boolean
      max_vcpus:
        type: integer
      topology:
        $ref: '#/definitions/vmm.CPUTopology'
    type: object
  vmm.CPUTopology:
    properties:
      cores_per_die:
        type: integer
      dies_per_package:
        type: integer
      packages:
        type: integer
      threads_per_core:
        type: integer
    type: object
  vmm.ConsoleConfig:
    properties:
      mode:
        description: '"Off", "Tty", "File", "Socket"'
        type: string
      path:
        type: string
    type: object
  vmm.DiskConfig:
    properties:
      direct:
        type: boolean
      iommu:
        type: boolean
      num_queues:
        type: integer
      path:
        type: string
      pci_segment:
        type: integer
      queue_size:
        type: integer
      rate_limiter_group:
        type: string
      readonly:
        type: boolean
      vhost_socket:
        type: string
      vhost_user:
        type: boolean
    type: object
  vmm.KernelConfig:
    properties:
      path:
        type: string
    type: object
  vmm.MemoryConfig:
    properties:
      hotplug_method:
        type: string
      hotplug_size:
        type: integer
      hugepage_size:
        type: integer
      hugepages:
        type: boolean
      mergeable:
        type: boolean
      shared:
        type: boolean
      size:
        type: integer
      zones:
        items:
          $ref: '#/definitions/vmm.MemoryZoneConfig'
        type: array
    type: object
  vmm.MemoryZoneConfig:
    properties:
      host_numa_node:
        type: integer
      hotplug_method:
        type: string
      hotplug_size:
        type: integer
      hugepage_size:
        type: integer
      hugepages:
        type: boolean
      id:
        type: string
      mergeable:
        type: boolean
      shared:
        type: boolean
      size:
        type: integer
    type: object
  vmm.NetConfig:
    properties:
      fd:
        items:
          type: integer
        type: array
      host_mac:
        type: string
      id:
        type: string
      iommu:
        type: boolean
      ip:
        type: string
      mac:
        type: string
      mask:
        type: string
      num_queues:
        type: integer
      queue_size:
        type: integer
      rate_limiter_group:
        type: string
      tap:
        type: string
      vhost_mode:
        type: string
      vhost_socket:
        type: string
      vhost_user:
        type: boolean
    type: object
  vmm.PayloadConfig:
    properties:
      cmdline:
        type: string
      firmware:
        type: string
      initramfs:
        type: string
      kernel:
        type: string
    type: object
  vmm.RngConfig:
    properties:
      src:
        type: string
    type: object
  vmm.VmConfig:
    properties:
      balloon:
        $ref: '#/definitions/vmm.BalloonConfig'
      console:
        $ref: '#/definitions/vmm.ConsoleConfig'
      cpus:
        $ref: '#/definitions/vmm.CPUConfig'
      disks:
        items:
          $ref: '#/definitions/vmm.DiskConfig'
        type: array
      kernel:
        $ref: '#/definitions/vmm.KernelConfig'
      memory:
        $ref: '#/definitions/vmm.MemoryConfig'
      net:
        items:
          $ref: '#/definitions/vmm.NetConfig'
        type: array
      payload:
        $ref: '#/definitions/vmm.PayloadConfig'
      rng:
        $ref: '#/definitions/vmm.RngConfig'
      serial:
        $ref: '#/definitions/vmm.ConsoleConfig'
    type: object
externalDocs:
  description: OpenAPI Specification
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: https://github.com/org/ch-api/issues
  description: REST API for managing Cloud Hypervisor VMs.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/org/ch-api
  title: Cloud Hypervisor API
  version: "1.0"
paths:
  /api/v1/status:
    get:
      description: Returns the current service status.
      responses:
        "200":
          description: running
          schema:
            type: string
      summary: Service status
      tags:
      - System
  /api/v1/vms:
    get:
      description: Returns a list of all virtual machines.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.VMResponse'
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: List VMs
      tags:
      - VMs
    post:
      consumes:
      - application/json
      description: Creates a new virtual machine with the given configuration.
      parameters:
      - description: VM configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateVMRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.VMResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Create VM
      tags:
      - VMs
  /api/v1/vms/{id}:
    delete:
      description: Deletes the virtual machine with the given ID.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Delete VM
      tags:
      - VMs
    get:
      description: Returns the virtual machine with the given ID.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.VMResponse'
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Get VM
      tags:
      - VMs
  /api/v1/vms/{id}/boot:
    post:
      description: Boots the virtual machine with the given ID.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Boot VM
      tags:
      - VM Lifecycle
  /api/v1/vms/{id}/console:
    get:
      description: Streams the serial console output of the virtual machine over WebSocket.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "101":
          description: WebSocket upgrade
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: VM Console
      tags:
      - Console
  /api/v1/vms/{id}/cpu:
    patch:
      consumes:
      - application/json
      description: Resizes the number of vCPUs for the virtual machine.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      - description: CPU resize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.PatchCPURequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CPUResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/problem.Detail'
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Resize CPU
      tags:
      - Resources
  /api/v1/vms/{id}/disks:
    post:
      consumes:
      - application/json
      description: Attaches a new disk to the virtual machine with the given ID.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      - description: Disk configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.AddDiskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.DiskResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/problem.Detail'
        "404":
          description: VM or disk not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Add Disk
      tags:
      - Disks
  /api/v1/vms/{id}/disks/{disk_id}:
    delete:
      description: Detaches the disk from the virtual machine with the given ID.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      - description: Disk ID
        in: path
        name: disk_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.DiskResponse'
            type: array
        "404":
          description: VM or disk not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Remove Disk
      tags:
      - Disks
  /api/v1/vms/{id}/disks/{disk_id}/snapshot:
    post:
      description: Creates a snapshot of the disk attached to the virtual machine.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      - description: Disk ID
        in: path
        name: disk_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.DiskResponse'
            type: array
        "404":
          description: VM or disk not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Snapshot Disk
      tags:
      - Disks
  /api/v1/vms/{id}/interfaces:
    post:
      consumes:
      - application/json
      description: Attaches a new network interface to the virtual machine.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      - description: Interface configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.AddInterfaceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.InterfaceResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/problem.Detail'
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Add Interface
      tags:
      - Network
  /api/v1/vms/{id}/interfaces/{iface_id}:
    delete:
      description: Detaches the network interface from the virtual machine.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      - description: Interface ID
        in: path
        name: iface_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.InterfaceResponse'
            type: array
        "404":
          description: VM or interface not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Remove Interface
      tags:
      - Network
    patch:
      consumes:
      - application/json
      description: Updates fields of an existing network interface on the virtual
        machine.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      - description: Interface ID
        in: path
        name: iface_id
        required: true
        type: string
      - description: Interface update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.PatchInterfaceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.InterfaceResponse'
            type: array
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/problem.Detail'
        "404":
          description: VM or interface not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Patch Interface
      tags:
      - Network
  /api/v1/vms/{id}/memory:
    patch:
      consumes:
      - application/json
      description: Resizes the memory allocated to the virtual machine.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      - description: Memory resize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.PatchMemoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MemoryResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/problem.Detail'
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Resize Memory
      tags:
      - Resources
  /api/v1/vms/{id}/pause:
    post:
      description: Pauses the virtual machine with the given ID.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Pause VM
      tags:
      - VM Lifecycle
  /api/v1/vms/{id}/reboot:
    post:
      description: Reboots the virtual machine with the given ID.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Reboot VM
      tags:
      - VM Lifecycle
  /api/v1/vms/{id}/resume:
    post:
      description: Resumes the paused virtual machine with the given ID.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Resume VM
      tags:
      - VM Lifecycle
  /api/v1/vms/{id}/shutdown:
    post:
      description: Shuts down the virtual machine with the given ID.
      parameters:
      - description: VM ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: VM not found
          schema:
            $ref: '#/definitions/problem.Detail'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/problem.Detail'
      summary: Shutdown VM
      tags:
      - VM Lifecycle
  /healthz:
    get:
      description: Returns a simple health check response.
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Health check
      tags:
      - System
swagger: "2.0"
