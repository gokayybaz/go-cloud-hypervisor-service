name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.23'

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ---------------------------------------------------------------------------
  # Unit and integration tests (with race detector)
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

  # ---------------------------------------------------------------------------
  # Build binary for linux/amd64
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build for linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ch-api-linux-amd64 ./cmd/ch-api

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ch-api-linux-amd64
          path: ch-api-linux-amd64

  # ---------------------------------------------------------------------------
  # Build Docker image
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ch-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker image inspect ch-api:latest
